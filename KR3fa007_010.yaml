body:
  text: 箭長三尺六寸方徑四分面各為二十五刻書夜四易而百刻同每時出扵盤心總二十五枝每氣用上下二箭二至各用一箭而始終之總太史四十八箭之法也壺高三尺徑一尺重四均其內別有銅浮蓮空中以泛箭闊七寸重叁拾兩壺面盤徑一尺三寸重十八斤捧箭仙人重八斤床二十五兩前雀右虎各二斤左龍二斤二兩後龜一斤七兩皆銅為之仙人坐盤中鐶以四神手捧小盤箭穿其中随水之積以生時刻

body:
  text: 而不必施于今之祭蕢桴土鼓用于古之樂而不必設於今之廷如明堂九鼎有無皆可以為國者君于不茍作也若夫孔壺為漏浮箭為刻以合天度以授人時古有其法萬世豈敢廢哉克昌既美公之有識知所謂若緩而不可忽者又深服其才于多事之日而有餘力于此為可書也公頃帥金陵逆知虜有動意即密為戰守備來朞年積鏹幾百餘萬緍及上親征至江上而軍須以濟其碓材遠略朝野推之謹并書于末以告將來奉國樓銅壺事件夜天池日天池平壺覆壺百刻萬分壺减水壺銘并序紹與三十二年太常伯韓公仲通來撫明州惟書夜𣼣之弗中使與居亡節𨒿更舊水稱為蓮華萬分壺呂齊天度命節度判官許克昌銘之官有常識呂時與息小人食力工在刻孧壺之失是𠁊天則于何敢康呂引幾日𨒿考璇璣器水以測智者創之謹正朝夕嗟牧之良立民之極
  hash: sha256:310ea784be308b4b4d0cdb58abb3e3526c5681fc3fecffc22cd187261860d82c

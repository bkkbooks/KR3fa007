body:
  text: 今四方無遠近知有四明刻漏者以王金陵之銘也南渡煙于兵火遺餘墨無所于考惟薳華漏者紹與末郡侯韓公仲通之新製也壺表具存銘識如故而挈壺無職則器之垢弊水之塵腐箭之遲速寧無豪釐分寸之差是舉一州之耳目視聽于一日四時之間皆為守者誤之也余懼焉一日取籌箭試加測驗則昏明之候不啻差一中朔于是洗滌其器易小之中而一新之池壺不移二晨昏以正大小與居之節風雨晦冥之侯俾皆于是取則而無𠁊焉仍擇其稍通于曆者謹視以時使有常職庶乎亦足以盡吾之心爾又應承襲夊之斘易至戾乃取李龍眠刻漏之制製併王之銘韓之刻漏之製併王之銘韓之刻並鋟于梓後之知為政者當于此有放云淳祐丁未授衣節日郡守龍溪顏俯仲書于進思堂
  hash: sha256:e19f3537b94a78ee58f26073618ba1225209c7ff1ab1721ff262d42f35a9b82b

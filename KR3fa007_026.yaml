body:
  text: 明州新刻漏銘王漏銘王荆公戊子王公始治于明丁亥孟冬刻漏刻具成追謂屬人差汝豫銘自古在昔挈壺有職匪器則弊人亡政息其政謂何弗棘弗遲君子小人與息維時東方未明自公召之彼寧不勤得罪于時厥荒懈廢乃政之疵鳴呼有州謹哉維茲維茲其中俾我俾後思明州新造蓮丵刻漏記許判克昌事有若緩而不切者在間暇之日智者或有所能而多事之際則雖智者不暇間也惟其才有餘而識濟之故能兼舉而無遺紹與三十一年秋金虜太舉入寇震驚淮甸聲言舟師自膠西航海以把浙江明州適當其衝朝廷分衛卒益以四州兮弩調泉福水軍雜以鄉兵幾萬人為三屯扼烈港守定海與東城而以前左丞相吳與沈公總之其年冬虜首為其下所弒全師遁去詔諸將經略青齊諸屯相繼撤而北征丞相引年得請以去上仍以東藩為重思得碓后之臣以繼之乃起大常伯韓公仲通于外祠付以郡事是時師旅之後軍事蕭然倉𢈔之積尤可哀痛客軍既去州軍寡弱亡命嘯集乘間竊發商賈稀少公𥝠俱困識者憂之公既視事則檢柅吏姦剔𥗤漏罷無事之食損無名之費財用充足又有贏餘寇擾海道不止

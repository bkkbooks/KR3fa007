body:
  text: 夫更漏箭壺高三尺徑一尺重四鈞共內別為銅浮蓮以泛箭闊七寸高三寸重叁拾兩壹面盤徑一尺三寸八斤捧箭仙人重八斤床二十五兩前雀右虎各二斤二斤二兩后龜一斤七兩皆銅為之仙人坐盤中镮以四手捧小盤箭穿其中随水之積以生時刻箭長三尺六寸徑四分面各為二十五刻畫夜四易百刻同每時出盤心即朱雀吐朱繋下銅盤以警守者盤連重四十三兩壹之前有盆𠗡一尺徑二尺五寸重二百斤以貯乾坤艮𢁉四時易箭之退水壺水下有䑓高七寸面徑一尺三寸重三鈞以承壺使鼇首吐水而豋扵箭揔二十五技每氣用上下二箭二至各用一箭而始終之揔太史四十八箭之法也鼇負荷承下斛渴鳥之水注壺中渴鳥長一尺八寸水竅容一中芥子斛方一尺五寸𠗡一尺二寸重七鈞傍臨脣一寸作螭首為减水之穴承以小斗斗長廣皆一尺重一百斤使斛水常平而均渴鳥之水勢下斛之上木為葢又植一銅荷承水上櫃渴鳥之水鳥霰捎天而長加二寸櫃長二尺深廣如下斛重二百八十斤櫃斛斗盆座皆冶鐵為之櫃斛之下為暗爐置火以休𣼣布冪櫃上以濾水新舊相半𠘶則小差遲速龍眠李伯詩序

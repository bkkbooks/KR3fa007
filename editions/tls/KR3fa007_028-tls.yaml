body:
  text: 即遣使論降之使以其眾歸環師一境晏安公精明而勇決嚴而不殘號令簡信人甚畏服州以辯治譙門舊有水稱則書夜𣼣之長幾久刓弊不可取信而司鐘皷者皆慵老無知之卒增減水不以時又無測景噐率以意斟酌不與天相應開垣晵閕唱籌䜵鼜皆不合節公慨然曰事若緩而不可忽者此也辟秦之人以花開落為春秋治世之人可使以星出沒為書夜乎吾為之牧坐視其顓冥昏囂不知𤼭莫因恬而不加卹且得無恧乎是不可以郡務繁無暇末節為解況此非末節乃訪知數者得吳人祝岷跡古制治銅為蓮華𣼣其上為二天池為平覆壺其旁為減水壺下為萬分壺注水相灌輸分書夜百刻為二十有一箭有合二分二至短長之候其數則採扵歴家而其度則考以日中之景也又惟古之為𣼣者必有表穰苴與莊賈期設表下𣼣媽其事也葢水增减不常而司之者懃怠不可保始或稍差末必大謬則又為測景盤浮針以定南北之極半規以正東西之景使𣼣失而求之景則雖千歲之日可坐致也為噐之銅則取扵沒入之减工治之費則取扵碓之贍扵計而雖一豪不以擾扵民也如此既命克昌銘之矣又使為之記克昌𥨸惟先王制噐尚象以前民用而無用之噐不作也四璉六湖用扵古之禮
